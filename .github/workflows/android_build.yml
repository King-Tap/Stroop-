name: Build Stroop APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Essential Tools
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
      - name: Build Web and Android
        run: |
          mkdir -p www
          cp index.html www/
          npx cap init "Stroop" "com.stroop.game" --web-dir www
          npx cap add android
          
          # مسح أيقونات الأندرويد الافتراضية تماماً
          rm -rf android/app/src/main/res/mipmap-*
          
          # إنشاء المجلدات من جديد ووضع صورتك فيها بالقوة
          mkdir -p android/app/src/main/res/mipmap-hdpi
          cp icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          
          # تكرار العملية لضمان ظهورها في كل الهواتف
          mkdir -p android/app/src/main/res/mipmap-mdpi && cp icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          mkdir -p android/app/src/main/res/mipmap-xhdpi && cp icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          mkdir -p android/app/src/main/res/mipmap-xxhdpi && cp icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi && cp icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Final Compilation
        run: |
          npx cap copy
          cd android && ./gradlew assembleDebug

      - name: Download APK
        uses: actions/upload-artifact@v4
        with:
          name: Stroop-Final-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
