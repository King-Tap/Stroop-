      - name: Apply Custom Icon
        run: |
          # التأكد من وجود الملف في المجلد الرئيسي
          if [ -f "icon.png" ]; then
            echo "Icon found, applying to all mipmap folders..."
            
            # حذف الأيقونات الافتراضية
            find android/app/src/main/res/mipmap-* -name "ic_launcher*.png" -delete
            find android/app/src/main/res/mipmap-* -name "ic_launcher_round.png" -delete
            
            # نسخ الملف المخصص إلى جميع مجلدات mipmap الموجودة
            for dir in android/app/src/main/res/mipmap-*; do
              cp icon.png "$dir/ic_launcher.png"
              cp icon.png "$dir/ic_launcher_round.png"
            done
            
            echo "Icons applied successfully."
          else
            echo "Error: icon.png not found in root directory!"
            exit 1
          fi
